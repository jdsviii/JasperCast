<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    <title>JasperCast - Weather by Jasper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22JasperCast%22,%22short_name%22:%22JasperCast%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0f172a%22,%22theme_color%22:%22#1e3a8a%22,%22icons%22:[{%22src%22:%22https://picsum.photos/id/1015/192/192%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .weather-card { transition: all 0.3s ease; }
        .weather-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .temp { font-size: 4.5rem; line-height: 1; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-950 via-indigo-950 to-slate-900 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-8">
            <div class="flex items-center gap-3">
                <i class="fas fa-cloud-sun text-4xl text-yellow-400"></i>
                <h1 class="text-3xl font-bold tracking-tight">JasperCast</h1>
            </div>
            <div class="flex flex-wrap items-center gap-3 sm:gap-4 justify-end">
                <button onclick="getCurrentLocation()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-colors">
                    <i class="fas fa-location-dot"></i>
                    <span class="hidden sm:inline">Current Location</span>
                </button>
                
                <!-- Temp Unit -->
                <div class="flex bg-white/10 rounded-xl p-1">
                    <button onclick="toggleTempUnit()" id="btnC" class="px-3 py-1 rounded-lg text-sm font-medium transition-all">°C</button>
                    <button onclick="toggleTempUnit()" id="btnF" class="px-3 py-1 rounded-lg text-sm font-medium transition-all">°F</button>
                </div>
                
                <!-- Speed Unit -->
                <button onclick="toggleSpeedUnit()" class="flex items-center gap-1 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-colors text-sm">
                    <span id="speedUnitLabel">km/h</span>
                </button>
                
                <!-- Search -->
                <div class="relative w-full sm:w-64">
                    <input id="cityInput" type="text" placeholder="City, State or ZIP" 
                           class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 pl-10 w-full focus:outline-none focus:border-white/40 transition-colors"
                           onkeypress="if(event.key === 'Enter') searchWeather()">
                    <i class="fas fa-search absolute left-3 top-3 text-white/50"></i>
                </div>
                
                <!-- Favorites -->
                <button onclick="showFavorites()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-colors">
                    <i class="fas fa-star"></i>
                </button>
            </div>
        </header>

        <!-- Current Weather -->
        <div id="currentWeather" class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 weather-card mb-8">
            <div id="location" class="text-2xl font-semibold flex items-center gap-2"></div>
            <div id="currentTime" class="text-white/70 text-sm"></div>
            
            <div class="flex items-end gap-6 mt-6">
                <div id="currentIcon" class="text-8xl"></div>
                <div>
                    <div id="currentTemp" class="temp font-light text-white"></div>
                    <div id="currentCondition" class="text-2xl capitalize"></div>
                    <div id="feelsLike" class="text-white/70"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 mt-10">
                <div class="bg-white/5 rounded-2xl p-4">
                    <div class="flex items-center gap-2 text-white/70 text-sm mb-1"><i class="fas fa-wind"></i><span>Wind</span></div>
                    <div id="windSpeed" class="text-2xl font-medium"></div>
                </div>
                <div class="bg-white/5 rounded-2xl p-4">
                    <div class="flex items-center gap-2 text-white/70 text-sm mb-1"><i class="fas fa-droplet"></i><span>Humidity</span></div>
                    <div id="humidity" class="text-2xl font-medium"></div>
                </div>
                <div class="bg-white/5 rounded-2xl p-4">
                    <div class="flex items-center gap-2 text-white/70 text-sm mb-1"><i class="fas fa-cloud-rain"></i><span>Precip</span></div>
                    <div id="precip" class="text-2xl font-medium"></div>
                </div>
            </div>
        </div>

        <!-- Alerts -->
        <div id="alerts" class="hidden bg-red-500/20 border border-red-400/50 rounded-3xl p-6 mb-8">
            <div class="flex items-center gap-3 text-red-400">
                <i class="fas fa-exclamation-triangle"></i>
                <span class="font-semibold">Severe Weather Alert</span>
            </div>
            <div id="alertText" class="mt-2 text-red-200"></div>
        </div>

        <!-- Forecasts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-6 weather-card">
                <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-clock"></i> Next 12 Hours</h3>
                <div id="hourlyList" class="space-y-4"></div>
            </div>
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-6 weather-card">
                <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-calendar-alt"></i> 7-Day Forecast</h3>
                <div id="dailyList" class="space-y-4"></div>
            </div>
        </div>

        <footer class="text-center text-white/50 text-xs mt-12">
            JasperCast • Powered by Open-Meteo
        </footer>
    </div>

    <script>
        const weatherCodes = {
            0: { desc: 'Clear sky', icon: '☀️' },
            1: { desc: 'Mainly clear', icon: '🌤️' },
            2: { desc: 'Partly cloudy', icon: '⛅' },
            3: { desc: 'Overcast', icon: '☁️' },
            45: { desc: 'Fog', icon: '🌫️' },
            51: { desc: 'Light drizzle', icon: '🌦️' },
            61: { desc: 'Slight rain', icon: '🌧️' },
            63: { desc: 'Moderate rain', icon: '🌧️' },
            65: { desc: 'Heavy rain', icon: '⛈️' },
            71: { desc: 'Slight snow', icon: '❄️' },
            95: { desc: 'Thunderstorm', icon: '⛈️' }
        };

        let currentLat = 38.75;
        let currentLon = -77.48;
        let currentUnit = 'celsius';
        let currentSpeedUnit = 'kmh';
        let currentCityState = '';
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        async function getWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation_probability&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max&timezone=auto&forecast_days=10`;
            const response = await fetch(url);
            return await response.json();
        }

        function convertTemp(c) {
            return currentUnit === 'fahrenheit' ? Math.round((c * 9/5) + 32) : Math.round(c);
        }

        function convertSpeed(kmh) {
            return currentSpeedUnit === 'mph' ? Math.round(kmh * 0.621371) : Math.round(kmh);
        }

        function updateUnitButtons() {
            document.getElementById('btnC').classList.toggle('bg-white/30', currentUnit === 'celsius');
            document.getElementById('btnF').classList.toggle('bg-white/30', currentUnit === 'fahrenheit');
            document.getElementById('speedUnitLabel').textContent = currentSpeedUnit === 'kmh' ? 'km/h' : 'mph';
        }

        function updateCurrentWeather(data) {
            const current = data.current;
            const unitSymbol = currentUnit === 'fahrenheit' ? 'F' : 'C';
            
            document.getElementById('location').innerHTML = `${currentCityState || 'Current Location'} <span class="text-sm font-normal text-white/60">(${currentLat.toFixed(2)}°N, ${Math.abs(currentLon).toFixed(2)}°W)</span>`;
            document.getElementById('currentTime').textContent = new Date().toLocaleString('en-US', { weekday: 'long', hour: 'numeric', minute: '2-digit' });
            
            const code = current.weather_code;
            const w = weatherCodes[code] || { desc: 'Unknown', icon: '🌡️' };
            
            document.getElementById('currentIcon').textContent = w.icon;
            document.getElementById('currentTemp').innerHTML = `${convertTemp(current.temperature_2m)}°<span class="text-2xl align-super font-normal">${unitSymbol}</span>`;
            document.getElementById('currentCondition').textContent = w.desc;
            document.getElementById('feelsLike').textContent = `Feels like ${convertTemp(current.apparent_temperature)}°${unitSymbol}`;
            
            document.getElementById('windSpeed').innerHTML = `${convertSpeed(current.wind_speed_10m)} <span class="text-sm">${currentSpeedUnit}</span>`;
            document.getElementById('humidity').innerHTML = `${current.relative_humidity_2m}<span class="text-sm">%</span>`;
            document.getElementById('precip').innerHTML = `${current.precipitation_probability}<span class="text-sm">%</span>`;
        }

        function updateHourly(data) {
            const container = document.getElementById('hourlyList');
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const time = new Date(data.hourly.time[i]);
                const hour = time.getHours().toString().padStart(2, '0');
                const temp = convertTemp(data.hourly.temperature_2m[i]);
                const w = weatherCodes[data.hourly.weather_code[i]] || { icon: '🌡️' };
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-white/5 rounded-2xl px-4 py-3';
                div.innerHTML = `<div class="w-16">${hour}:00</div><div class="text-3xl">${w.icon}</div><div class="font-medium">${temp}°</div>`;
                container.appendChild(div);
            }
        }

        function updateDaily(data) {
            const container = document.getElementById('dailyList');
            container.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                const date = new Date(data.daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const w = weatherCodes[data.daily.weather_code[i]] || { icon: '🌡️' };
                const max = convertTemp(data.daily.temperature_2m_max[i]);
                const min = convertTemp(data.daily.temperature_2m_min[i]);
                const div = document.createElement('div');
                div.className = 'flex justify-between bg-white/5 rounded-2xl px-4 py-3';
                div.innerHTML = `<div>${dayName}</div><div class="text-3xl">${w.icon}</div><div>${max}° / ${min}°</div>`;
                container.appendChild(div);
            }
        }

        function checkAlerts(data) {
            const alertsDiv = document.getElementById('alerts');
            const highRisk = data.current.precipitation_probability > 70 || data.daily.precipitation_probability_max[0] > 80;
            const thunderstorm = [95,96,99].includes(data.current.weather_code);
            
            if (highRisk || thunderstorm) {
                alertsDiv.classList.remove('hidden');
                document.getElementById('alertText').innerHTML = thunderstorm ? 
                    "Thunderstorms possible. Stay safe!" : 
                    "Heavy rain likely. Flash flooding risk.";
            } else {
                alertsDiv.classList.add('hidden');
            }
        }

        async function loadWeather(lat, lon) {
            const data = await getWeather(lat, lon);
            if (data) {
                updateCurrentWeather(data);
                updateHourly(data);
                updateDaily(data);
                checkAlerts(data);
            }
        }

        async function searchWeather() {
            const input = document.getElementById('cityInput').value.trim();
            if (!input) return;
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(input)}&limit=1`, {
                    headers: { 'User-Agent': 'JasperCast' }
                });
                const geoData = await geoRes.json();
                if (geoData && geoData.length > 0) {
                    currentLat = parseFloat(geoData[0].lat);
                    currentLon = parseFloat(geoData[0].lon);
                    currentCityState = geoData[0].display_name.split(', ').slice(0, 2).join(', ');
                    await loadWeather(currentLat, currentLon);
                } else {
                    alert('Location not found. Try a different search.');
                }
            } catch (e) {
                alert('Search service unavailable.');
            }
        }

        async function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    currentLat = position.coords.latitude;
                    currentLon = position.coords.longitude;
                    currentCityState = ''; // Will use coords
                    await loadWeather(currentLat, currentLon);
                }, () => alert('Location access denied.'));
            }
        }

        function toggleTempUnit() {
            currentUnit = currentUnit === 'celsius' ? 'fahrenheit' : 'celsius';
            updateUnitButtons();
            loadWeather(currentLat, currentLon);
        }

        function toggleSpeedUnit() {
            currentSpeedUnit = currentSpeedUnit === 'kmh' ? 'mph' : 'kmh';
            updateUnitButtons();
            loadWeather(currentLat, currentLon);
        }

        function updateUnitButtons() {
            document.getElementById('btnC').classList.toggle('bg-white/30', currentUnit === 'celsius');
            document.getElementById('btnF').classList.toggle('bg-white/30', currentUnit === 'fahrenheit');
            document.getElementById('speedUnitLabel').textContent = currentSpeedUnit === 'kmh' ? 'km/h' : 'mph';
        }

        function addFavorite(name, lat, lon) {
            if (!favorites.find(f => f.name === name)) {
                favorites.push({name, lat, lon});
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
            }
        }

        function showFavorites() {
            if (favorites.length === 0) return alert("No favorites yet!");
            let msg = "Favorites:\n";
            favorites.forEach((f, i) => msg += `${i+1}. ${f.name}\n`);
            const choice = prompt(msg + "\nEnter number to load or 'clear':");
            if (choice === 'clear') {
                favorites = [];
                localStorage.setItem('weatherFavorites', JSON.stringify([]));
            } else if (choice) {
                const idx = parseInt(choice) - 1;
                if (favorites[idx]) loadWeather(favorites[idx].lat, favorites[idx].lon);
            }
        }

        window.onload = () => {
            updateUnitButtons();
            loadWeather(currentLat, currentLon);
        };
    </script>
</body>
</html>
