<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    <title>JasperCast - Weather by Jasper Saunders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22JasperCast%22,%22short_name%22:%22JasperCast%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0f172a%22,%22theme_color%22:%22#1e3a8a%22,%22icons%22:[{%22src%22:%22https://picsum.photos/id/1015/192/192%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: linear-gradient(135deg, #0f172a, #1e2937); 
        }
        .glass { 
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .temp { font-size: 5rem; line-height: 1; font-weight: 300; }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-6 mb-10">
            <div class="flex items-center gap-4">
                <i class="fas fa-cloud-sun text-5xl text-amber-400"></i>
                <h1 class="text-4xl font-bold tracking-tight">JasperCast</h1>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <button onclick="getCurrentLocation()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 py-3 rounded-2xl transition-colors">
                    <i class="fas fa-location-dot"></i>
                    <span class="hidden sm:inline">Current Location</span>
                </button>
                
                <div class="flex bg-white/10 rounded-2xl p-1">
                    <button onclick="toggleTempUnit()" id="btnC" class="px-4 py-2 rounded-xl text-sm font-medium transition-all">°C</button>
                    <button onclick="toggleTempUnit()" id="btnF" class="px-4 py-2 rounded-xl text-sm font-medium transition-all bg-white/30">°F</button>
                </div>
                
                <button onclick="toggleSpeedUnit()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 py-3 rounded-2xl transition-colors text-sm">
                    <span id="speedUnitLabel">mph</span>
                </button>
                
                <div class="relative w-full sm:w-72">
                    <input id="cityInput" type="text" placeholder="Search city, state or ZIP" 
                           class="bg-white/10 border border-white/20 rounded-2xl px-5 py-3 pl-12 w-full focus:outline-none focus:border-white/40 transition-colors"
                           onkeypress="if(event.key === 'Enter') searchWeather()">
                    <i class="fas fa-search absolute left-4 top-4 text-white/50"></i>
                </div>
                
                <button onclick="showFavorites()" class="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">
                    <i class="fas fa-star"></i>
                </button>
            </div>
        </header>

        <!-- Current Weather -->
        <div id="currentWeather" class="glass rounded-3xl p-10 mb-8">
            <div class="flex justify-between items-start">
                <div>
                    <div id="location" class="text-3xl font-semibold"></div>
                    <div id="currentTime" class="text-white/60 mt-1"></div>
                </div>
                <div id="currentIcon" class="text-8xl"></div>
            </div>
            
            <div class="flex items-end gap-8 mt-6">
                <div id="currentTemp" class="temp"></div>
                <div>
                    <div id="currentCondition" class="text-3xl capitalize"></div>
                    <div id="feelsLike" class="text-xl text-white/70"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-6 mt-12">
                <div class="text-center">
                    <div class="text-white/60 text-sm">WIND</div>
                    <div id="windSpeed" class="text-4xl font-medium mt-2"></div>
                </div>
                <div class="text-center">
                    <div class="text-white/60 text-sm">HUMIDITY</div>
                    <div id="humidity" class="text-4xl font-medium mt-2"></div>
                </div>
                <div class="text-center">
                    <div class="text-white/60 text-sm">PRECIPITATION</div>
                    <div id="precip" class="text-4xl font-medium mt-2"></div>
                </div>
            </div>
        </div>

        <!-- Hourly -->
        <div class="glass rounded-3xl p-8 mb-8">
            <h3 class="font-semibold mb-6 text-lg flex items-center gap-2"><i class="fas fa-clock"></i> Hourly Forecast</h3>
            <div id="hourlyList" class="flex gap-8 overflow-x-auto pb-4"></div>
        </div>

        <!-- Daily -->
        <div class="glass rounded-3xl p-8">
            <h3 class="font-semibold mb-6 text-lg flex items-center gap-2"><i class="fas fa-calendar-alt"></i> 7-Day Forecast</h3>
            <div id="dailyList" class="space-y-4"></div>
        </div>

        <footer class="text-center text-white/50 text-xs mt-16">
            JasperCast • Powered by Open-Meteo
        </footer>
    </div>

    <script>
        const weatherCodes = {
            0: { desc: 'Clear sky', icon: '☀️' },
            1: { desc: 'Mainly clear', icon: '🌤️' },
            2: { desc: 'Partly cloudy', icon: '⛅' },
            3: { desc: 'Overcast', icon: '☁️' },
            45: { desc: 'Fog', icon: '🌫️' },
            51: { desc: 'Light drizzle', icon: '🌦️' },
            61: { desc: 'Slight rain', icon: '🌧️' },
            63: { desc: 'Moderate rain', icon: '🌧️' },
            65: { desc: 'Heavy rain', icon: '⛈️' },
            71: { desc: 'Slight snow', icon: '❄️' },
            95: { desc: 'Thunderstorm', icon: '⛈️' }
        };

        let currentLat = 38.75;
        let currentLon = -77.48;
        let currentUnit = 'fahrenheit';      // Default: Fahrenheit
        let currentSpeedUnit = 'mph';        // Default: MPH
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        async function getWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation_probability&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max&timezone=auto&forecast_days=10`;
            const response = await fetch(url);
            return await response.json();
        }

        function convertTemp(c) {
            return currentUnit === 'fahrenheit' ? Math.round((c * 9/5) + 32) : Math.round(c);
        }

        function convertSpeed(kmh) {
            return currentSpeedUnit === 'mph' ? Math.round(kmh * 0.621371) : Math.round(kmh);
        }

        function updateUnitButtons() {
            document.getElementById('btnC').classList.toggle('bg-white/30', currentUnit === 'celsius');
            document.getElementById('btnF').classList.toggle('bg-white/30', currentUnit === 'fahrenheit');
            document.getElementById('speedUnitLabel').textContent = currentSpeedUnit;
        }

        function updateCurrentWeather(data) {
            const current = data.current;
            const unitSymbol = currentUnit === 'fahrenheit' ? 'F' : 'C';
            
            document.getElementById('location').innerHTML = `Current Location <span class="text-sm font-normal text-white/60">(${currentLat.toFixed(2)}°N, ${Math.abs(currentLon).toFixed(2)}°W)</span>`;
            document.getElementById('currentTime').textContent = new Date().toLocaleString('en-US', { weekday: 'long', hour: 'numeric', minute: '2-digit' });
            
            const code = current.weather_code;
            const w = weatherCodes[code] || { desc: 'Unknown', icon: '🌡️' };
            
            document.getElementById('currentIcon').textContent = w.icon;
            document.getElementById('currentTemp').innerHTML = `${convertTemp(current.temperature_2m)}°<span class="text-2xl align-super font-normal">${unitSymbol}</span>`;
            document.getElementById('currentCondition').textContent = w.desc;
            document.getElementById('feelsLike').textContent = `Feels like ${convertTemp(current.apparent_temperature)}°${unitSymbol}`;
            
            document.getElementById('windSpeed').innerHTML = `${convertSpeed(current.wind_speed_10m)} <span class="text-sm">${currentSpeedUnit}</span>`;
            document.getElementById('humidity').innerHTML = `${current.relative_humidity_2m}<span class="text-sm">%</span>`;
            document.getElementById('precip').innerHTML = `${current.precipitation_probability}<span class="text-sm">%</span>`;
        }

        function updateHourly(data) {
            const container = document.getElementById('hourlyList');
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const time = new Date(data.hourly.time[i]);
                const hour = time.getHours().toString().padStart(2, '0');
                const temp = convertTemp(data.hourly.temperature_2m[i]);
                const w = weatherCodes[data.hourly.weather_code[i]] || { icon: '🌡️' };
                const div = document.createElement('div');
                div.className = 'text-center min-w-[70px]';
                div.innerHTML = `
                    <div class="text-xs text-white/60">${hour}:00</div>
                    <div class="text-4xl my-2">${w.icon}</div>
                    <div class="font-medium">${temp}°</div>
                `;
                container.appendChild(div);
            }
        }

        function updateDaily(data) {
            const container = document.getElementById('dailyList');
            container.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                const date = new Date(data.daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const w = weatherCodes[data.daily.weather_code[i]] || { icon: '🌡️' };
                const max = convertTemp(data.daily.temperature_2m_max[i]);
                const min = convertTemp(data.daily.temperature_2m_min[i]);
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between py-4 border-b border-white/10 last:border-none';
                div.innerHTML = `
                    <div class="w-20">${dayName}</div>
                    <div class="text-4xl">${w.icon}</div>
                    <div class="flex-1 mx-8 text-right">
                        <span class="font-medium">${max}°</span> 
                        <span class="text-white/60 ml-4">${min}°</span>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        async function loadWeather(lat, lon) {
            const data = await getWeather(lat, lon);
            if (data) {
                updateCurrentWeather(data);
                updateHourly(data);
                updateDaily(data);
            }
        }

        async function searchWeather() {
            const input = document.getElementById('cityInput').value.trim();
            if (!input) return;
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(input)}&limit=1`, {headers: {'User-Agent': 'JasperCast'}});
                const geoData = await geoRes.json();
                if (geoData && geoData.length > 0) {
                    currentLat = parseFloat(geoData[0].lat);
                    currentLon = parseFloat(geoData[0].lon);
                    await loadWeather(currentLat, currentLon);
                }
            } catch (e) {
                alert("Search failed");
            }
        }

        async function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;
                    await loadWeather(currentLat, currentLon);
                });
            }
        }

        function toggleTempUnit() {
            currentUnit = currentUnit === 'celsius' ? 'fahrenheit' : 'celsius';
            updateUnitButtons();
            loadWeather(currentLat, currentLon);
        }

        function toggleSpeedUnit() {
            currentSpeedUnit = currentSpeedUnit === 'kmh' ? 'mph' : 'kmh';
            updateUnitButtons();
            loadWeather(currentLat, currentLon);
        }

        function updateUnitButtons() {
            document.getElementById('btnC').classList.toggle('bg-white/30', currentUnit === 'celsius');
            document.getElementById('btnF').classList.toggle('bg-white/30', currentUnit === 'fahrenheit');
            document.getElementById('speedUnitLabel').textContent = currentSpeedUnit;
        }

        function showFavorites() {
            alert("Favorites feature active. Search and add locations to use it.");
        }

        window.onload = () => {
            updateUnitButtons();
            loadWeather(currentLat, currentLon);
        };
    </script>
</body>
</html>
